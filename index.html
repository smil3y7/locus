<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOCUS · Muzejska dokumentacijska platforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<template id="mf-logo-fallback">
  <svg viewBox="0 0 48 48" width="34" height="34">
    <rect x="4" y="14" width="40" height="4" fill="currentColor"/>
    <polygon points="24,4 44,14 4,14" fill="currentColor"/>
    <rect x="8" y="20" width="4" height="18" fill="currentColor"/>
    <rect x="22" y="20" width="4" height="18" fill="currentColor"/>
    <rect x="36" y="20" width="4" height="18" fill="currentColor"/>
    <rect x="4" y="40" width="40" height="4" fill="currentColor"/>
  </svg>
</template>

<header class="mf-header">
  <div class="mf-header-mark" aria-hidden="true">
    <!--
      Logo placeholder: drop your two exported PNGs into /assets using
      exactly these filenames (see /assets/README.md for details):
        assets/logo-on-light.png   <- used here, in this light header
        assets/logo-on-dark.png    <- reserved for future dark surfaces
      Until logo-on-light.png exists, onerror swaps in the LOCUS mark below
      so the header never looks broken.
    -->
    <img
      src="assets/logo-on-light.png"
      alt="LOCUS logotip"
      class="mf-logo-img"
      onerror="this.replaceWith(document.getElementById('mf-logo-fallback').content.cloneNode(true))"
    />
  </div>
  <div class="mf-header-titles">
    <p class="mf-eyebrow">Muzejska dokumentacijska platforma</p>
    <h1>LOCUS</h1>
  </div>
  <div class="mf-header-actions">
    <button type="button" class="mf-btn mf-btn-ghost" id="mf-session-btn">Nastavitve seje</button>
    <button type="button" class="mf-btn mf-btn-ghost" id="mf-edit-config-btn">Uredi obrazec</button>
    <button type="button" class="mf-btn mf-btn-primary" id="mf-add-entry-btn">+ Dodaj predmet</button>
  </div>
</header>

<main class="mf-main">
  <section class="mf-collection">
    <div class="mf-collection-heading">
      <h2>Zbirka</h2>
      <span class="mf-collection-sub">Vsi vneseni predmeti, shranjeni lokalno v tem brskalniku.</span>
      <button type="button" class="mf-btn mf-btn-ghost mf-btn-small" id="mf-print-catalog-btn">Natisni katalog</button>
    </div>
    <div class="mf-entries-list" id="mf-entries-list">
      <div class="mf-empty-state"><p>Nalaganje zbirke …</p></div>
    </div>
  </section>
</main>

<footer class="mf-footer">
  <span>Deluje 100&nbsp;% brez povezave · Podatki ostanejo na tej napravi (IndexedDB) · <span id="mf-app-version"></span></span>
</footer>

<div id="mf-print-area"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
